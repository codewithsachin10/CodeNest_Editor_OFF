<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeNest Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .splash {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 56px 72px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            font-size: 56px;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 32px;
            font-style: italic;
        }

        .loader {
            width: 180px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 0 auto;
            overflow: hidden;
        }

        .loader-bar {
            width: 35%;
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 4px;
            animation: loading 1.2s ease-in-out infinite;
        }

        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(400%);
            }
        }

        .tagline {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 24px;
            letter-spacing: 0.5px;
        }

        .version {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="splash">
        <div class="logo">🪺</div>
        <div class="title">CodeNest Studio</div>
        <div class="subtitle">Learn to Code, Not to Install</div>
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
        <div class="tagline">A beginner-first coding environment</div>
        <div class="version" id="app-version">v1.0.0</div>
    </div>
    <script>
        // Version is injected by main process via executeJavaScript after load
    </script>
</body>

</html>
